<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Try-On App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            color: #00f0ff;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .header p {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        .upload-section {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .upload-box {
            flex: 1;
            min-width: 300px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 127, 0.1));
            border: 2px dashed #00f0ff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .upload-box:hover {
            border-color: #ff007f;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            transform: translateY(-5px);
        }

        .upload-box input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
            display: block;
        }

        .upload-box label {
            display: block;
            cursor: pointer;
        }

        .upload-title {
            color: #00f0ff;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .upload-text {
            color: #a0a0a0;
            font-size: 0.95em;
            display: block;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #707070;
            font-size: 0.85em;
            display: block;
        }

        .image-preview {
            margin-top: 15px;
            width: 100%;
            max-height: 200px;
            border-radius: 10px;
            display: none;
            object-fit: cover;
        }

        .image-preview.active {
            display: block;
        }

        .button-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00f0ff, #ff007f);
            color: white;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            color: #00f0ff;
            border: 2px solid #00f0ff;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 2px solid rgba(0, 240, 255, 0.2);
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .result-title {
            color: #00f0ff;
            font-size: 1.5em;
            margin-bottom: 25px;
            text-align: center;
        }

        .result-image-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .result-image {
            max-width: 100%;
            max-height: 500px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 240, 255, 0.2);
        }

        .loading {
            display: none;
            text-align: center;
            color: #00f0ff;
        }

        .loading.active {
            display: block;
        }

        .loader {
            border: 4px solid rgba(0, 240, 255, 0.2);
            border-top: 4px solid #00f0ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 0, 127, 0.2);
            border: 2px solid #ff007f;
            color: #ff6b9d;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .error-message.active {
            display: block;
        }

        .success-message {
            background: rgba(0, 240, 255, 0.2);
            border: 2px solid #00f0ff;
            color: #00f0ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message.active {
            display: block;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .upload-section {
                flex-direction: column;
                gap: 20px;
            }

            .upload-box {
                min-width: auto;
            }

            .result-image-container {
                min-height: 200px;
            }

            .result-image {
                max-height: 300px;
            }
        }

        .file-info {
            color: #707070;
            font-size: 0.85em;
            margin-top: 10px;
            display: none;
        }

        .file-info.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Virtual Try-On</h1>
            <p>Upload your photo and clothing item to see how it looks</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="tryonForm" enctype="multipart/form-data">
            <div class="upload-section">
                <!-- Left Upload Box: User Photo -->
                <div class="upload-box" id="photoBox">
                    <label for="userPhoto">
                        <span class="upload-icon">👤</span>
                        <span class="upload-title">Upload Your Photo</span>
                        <span class="upload-text">Click or drag to upload</span>
                        <span class="upload-hint">JPG, PNG (Max 10MB)</span>
                        <img id="photoPreview" class="image-preview" alt="Photo preview">
                        <div class="file-info" id="photoInfo"></div>
                    </label>
                    <input type="file" id="userPhoto" name="photo" accept="image/*" required>
                </div>

                <!-- Right Upload Box: Clothing Image -->
                <div class="upload-box" id="clothingBox">
                    <label for="clothingImage">
                        <span class="upload-icon">👕</span>
                        <span class="upload-title">Upload Clothing Image</span>
                        <span class="upload-text">Click or drag to upload</span>
                        <span class="upload-hint">JPG, PNG (Max 10MB)</span>
                        <img id="clothingPreview" class="image-preview" alt="Clothing preview">
                        <div class="file-info" id="clothingInfo"></div>
                    </label>
                    <input type="file" id="clothingImage" name="clothing" accept="image/*" required>
                </div>
            </div>

            <div class="button-section">
                <button type="reset" class="btn btn-secondary" id="resetBtn">Reset</button>
                <button type="submit" class="btn btn-primary" id="tryonBtn">Try It On</button>
            </div>
        </form>

        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="loader"></div>
            <p>Processing your images...</p>
        </div>

        <!-- Result Section -->
        <div class="result-section" id="resultSection">
            <div class="result-title">✅ Your Try-On Result</div>
            <div class="result-image-container">
                <img id="resultImage" class="result-image" alt="Try-on result">
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('tryonForm');
        const userPhotoInput = document.getElementById('userPhoto');
        const clothingImageInput = document.getElementById('clothingImage');
        const photoPreview = document.getElementById('photoPreview');
        const clothingPreview = document.getElementById('clothingPreview');
        const tryonBtn = document.getElementById('tryonBtn');
        const resetBtn = document.getElementById('resetBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const resultImage = document.getElementById('resultImage');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const photoBox = document.getElementById('photoBox');
        const clothingBox = document.getElementById('clothingBox');
        const photoInfo = document.getElementById('photoInfo');
        const clothingInfo = document.getElementById('clothingInfo');

        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB

        // Handle file preview and validation
        userPhotoInput.addEventListener('change', (e) => {
            handleFileSelect(e, photoPreview, photoInfo, photoBox);
        });

        clothingImageInput.addEventListener('change', (e) => {
            handleFileSelect(e, clothingPreview, clothingInfo, clothingBox);
        });

        function handleFileSelect(event, preview, infoElement, uploadBox) {
            const file = event.target.files[0];
            if (!file) return;

            // Validate file size
            if (file.size > MAX_FILE_SIZE) {
                showError('File size exceeds 10MB limit');
                event.target.value = '';
                preview.classList.remove('active');
                infoElement.classList.remove('active');
                return;
            }

            // Validate file type
            if (!file.type.startsWith('image/')) {
                showError('Please select a valid image file');
                event.target.value = '';
                preview.classList.remove('active');
                infoElement.classList.remove('active');
                return;
            }

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.add('active');
                uploadBox.style.borderColor = '#00f0ff';
                
                // Show file info
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                infoElement.textContent = `✓ ${file.name} (${sizeMB}MB)`;
                infoElement.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        // Drag and drop functionality
        [photoBox, clothingBox].forEach(box => {
            box.addEventListener('dragover', (e) => {
                e.preventDefault();
                box.style.borderColor = '#ff007f';
                box.style.background = 'rgba(255, 0, 127, 0.1)';
            });

            box.addEventListener('dragleave', (e) => {
                e.preventDefault();
                box.style.borderColor = '#00f0ff';
                box.style.background = 'linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 127, 0.1))';
            });

            box.addEventListener('drop', (e) => {
                e.preventDefault();
                box.style.borderColor = '#00f0ff';
                box.style.background = 'linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(255, 0, 127, 0.1))';
                
                const input = box.querySelector('input[type="file"]');
                if (e.dataTransfer.files.length) {
                    input.files = e.dataTransfer.files;
                    const event = new Event('change', { bubbles: true });
                    input.dispatchEvent(event);
                }
            });
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();

            // Validate both files are selected
            if (!userPhotoInput.files[0] || !clothingImageInput.files[0]) {
                showError('Please upload both images');
                return;
            }

            // Prepare form data
            const formData = new FormData();
            formData.append('person_image', userPhotoInput.files[0]);
            formData.append('cloth_image', clothingImageInput.files[0]);

            // Show loading state
            loading.classList.add('active');
            tryonBtn.disabled = true;
            resultSection.classList.remove('active');

            try {
                const response = await fetch('/tryon', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || `Server error: ${response.status}`);
                }

                const data = await response.json();

                // Display result
                if (data.result_image) {
                    resultImage.src = data.result_image;
                    resultSection.classList.add('active');
                    showSuccess('Try-on completed successfully! 🎉');
                } else {
                    throw new Error('No result image in response');
                }
            } catch (error) {
                console.error('Error:', error);
                showError(error.message || 'Failed to process images. Please try again.');
            } finally {
                loading.classList.remove('active');
                tryonBtn.disabled = false;
            }
        });

        // Reset functionality
        resetBtn.addEventListener('click', () => {
            form.reset();
            photoPreview.classList.remove('active');
            clothingPreview.classList.remove('active');
            photoInfo.classList.remove('active');
            clothingInfo.classList.remove('active');
            resultSection.classList.remove('active');
            clearMessages();
            photoBox.style.borderColor = '#00f0ff';
            clothingBox.style.borderColor = '#00f0ff';
        });

        // Message functions
        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.add('active');
            setTimeout(() => {
                errorMessage.classList.remove('active');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('active');
            setTimeout(() => {
                successMessage.classList.remove('active');
            }, 5000);
        }

        function clearMessages() {
            errorMessage.classList.remove('active');
            successMessage.classList.remove('active');
        }
    </script>
</body>
</html>
